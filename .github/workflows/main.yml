name: Deploy Files

on:
  push:
    branches:
      - main
  # Enables manually triggering of Workflow with file synchronization option
  workflow_dispatch:
    inputs:
      sync:
        description: "File synchronization"
        required: true
        default: "delta"

jobs:
  deploy-main:
    name: "Deploy Files"
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Deploy"
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: "sftp"
          remote-host: ${{ vars.HOST }}
          remote-user: ${{ vars.USER }}
          remote-password: ${{ secrets.PASS }}
          remote-path: ${{ vars.PATH }}
      - name: "Post Deploy Script"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USER }}
          password: ${{ secrets.PASS }}
          script: cd ${{ vars.PATH }} && composer install && php craft up && ./cachebust.sh
